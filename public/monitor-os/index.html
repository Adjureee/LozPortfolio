        <script>
            window.onload = () => {
                addEventListener('mousemove', (e) => {
                    window.parent.postMessage(
                        {
                            clientX: e.clientX,
                            clientY: e.clientY,
                            type: 'mousemove',
                        },
                        '*',
                    );
                });
                addEventListener('mousedown', () => {
                    window.parent.postMessage({ type: 'mousedown' }, '*');
                });
                addEventListener('mouseup', () => {
                    window.parent.postMessage({ type: 'mouseup' }, '*');
                });
                addEventListener('keydown', (e) => {
                    window.parent.postMessage(
                        { type: 'keydown', key: e.key },
                        '*',
                    );
                });
                addEventListener('keyup', (e) => {
                    window.parent.postMessage(
                        { type: 'keyup', key: e.key },
                        '*',
                    );
                });

                // Observe for Shutdown animation text and close OS
                const observer = new MutationObserver((mutations) => {
                    if (document.body.innerText.includes("Beginning Pre-Shutdown Sequence...")) {
                        window.parent.postMessage({ type: 'PLAY_SHUTDOWN' }, '*');
                        setTimeout(() => {
                            window.parent.postMessage({ type: 'CLOSE_OS' }, '*');
                        }, 2500); // Wait 2.5s to let the user see the text
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true, characterData: true });
            };
        </script>

        /* Strict Windows 95 Theme Overrides */
        :root {
            --button-highlight: #ffffff;
            --button-face: #dfdfdf;
            --button-shadow: #808080;
            --window-frame: #000000;
            --surface: #c0c0c0; /* Gray for windows and taskbar */

        /* Ensure texts use the correct font and color */

        /* If surface is used for windows, force them to be gray */
        .window, .window-container, [style*="background-color: silver"] {
            background-color: #c0c0c0 !important;
        }
